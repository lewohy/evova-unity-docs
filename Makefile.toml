[tasks.extract]
description = "마크다운 원본에서 번역 템플릿 추출"
command = "mdbook"
args = ["build", "-d", "po"]
env = { "MDBOOK_OUTPUT" = '{"xgettext": {}}' }

[tasks.merge]
description = "추출된 템플릿을 기존 en.po에 병합"
command = "msgmerge"
args = ["--update", "po/en.po", "po/messages.pot"]

[tasks.build-en]
description = "영어 문서 빌드"
command = "mdbook"
args = ["build", "-d", "book"]
env = { "MDBOOK_BOOK__LANGUAGE" = "en" }

[tasks.build-ko]
description = "한국어 문서 빌드"
command = "mdbook"
args = ["build", "-d", "book/ko"]
env = { "MDBOOK_BOOK__LANGUAGE" = "ko" }
